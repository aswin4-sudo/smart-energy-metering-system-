<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitMinds | AI Recommendations</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --quantum-blue: #00f0ff;
            --neon-purple: #9d00ff;
            --cyber-green: #00ffaa;
            --matrix-black: #0a0a14;
            --dark-space: #05050a;
            --hologram-white: #e0e0ff;
            --card-bg: rgba(10, 10, 20, 0.7);
            --glow-blue: 0 0 15px rgba(0, 240, 255, 0.5);
            --glow-purple: 0 0 15px rgba(157, 0, 255, 0.5);
            --gradient-blue: linear-gradient(135deg, var(--quantum-blue), #0066ff);
            --gradient-purple: linear-gradient(135deg, var(--neon-purple), #ff00e4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
        }

        @font-face {
            font-family: 'Orbitron';
            src: url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap');
        }

        body {
            background-color: var(--dark-space);
            color: var(--hologram-white);
            background-image: 
                radial-gradient(circle at 25% 25%, rgba(0, 240, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 75% 75%, rgba(157, 0, 255, 0.1) 0%, transparent 50%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Holographic header */
        .header {
            background: var(--matrix-black);
            color: white;
            padding: 1.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 1px solid rgba(0, 240, 255, 0.3);
            box-shadow: var(--glow-blue);
        }

        .header::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--gradient-blue);
            animation: borderFlow 6s linear infinite;
        }

        @keyframes borderFlow {
            0% { background-position: 0% 50%; }
            100% { background-position: 100% 50%; }
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 500;
            margin: 0;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: var(--gradient-blue);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.3);
        }

        .header p {
            font-size: 1rem;
            margin-top: 0.5rem;
            opacity: 0.8;
            letter-spacing: 1px;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Cyber status bar */
        .status-bar {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            margin: 1.5rem auto;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border: 1px solid rgba(0, 240, 255, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: var(--cyber-green);
            box-shadow: 0 0 10px var(--cyber-green);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .last-updated {
            color: rgba(224, 224, 255, 0.7);
            font-family: 'Segoe UI', sans-serif;
        }

        /* Main dashboard grid */
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        /* AI Container */
        .ai-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }

        /* Holographic card design */
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid rgba(0, 240, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 240, 255, 0.1) 0%, transparent 70%);
            transform: rotate(30deg);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3), var(--glow-blue);
            border-color: rgba(0, 240, 255, 0.3);
        }

        .stat-card:hover::before {
            opacity: 1;
        }

        .stat-card h2 {
            font-size: 1.1rem;
            color: var(--quantum-blue);
            margin-bottom: 1rem;
            font-weight: 500;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Cyber recommendation styling */
        .cyber-recommendation {
            background: rgba(10, 10, 30, 0.6);
            border-left: 3px solid #9d00ff;
            padding: 1.5rem;
            margin: 1rem 0;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(157, 0, 255, 0.2);
        }

        .cyber-text {
            line-height: 1.6;
            font-size: 1.1rem;
        }

        .timestamp {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: #00f0ff;
            text-align: right;
        }

        .summary-item {
            display: flex;
            justify-content: space-between;
            margin: 0.5rem 0;
            padding: 0.5rem;
            background: rgba(0, 240, 255, 0.1);
            border-radius: 4px;
        }

        /* AI button */
        .ai-button {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--gradient-purple);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 2rem auto;
            text-decoration: none;
            box-shadow: var(--glow-purple);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .ai-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(157, 0, 255, 0.6);
        }

        /* Loading states */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--quantum-blue);
        }

        .loading i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            color: #ff5555;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Back button */
        .back-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: var(--gradient-purple);
            color: white;
            padding: 1rem 2rem;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 2rem auto;
            text-decoration: none;
            box-shadow: var(--glow-purple);
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 1px;
        }

        .back-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(157, 0, 255, 0.6);
        }

        .button-container {
            display: flex;
            justify-content: center;
        }
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.8rem;
            margin-top: 1rem;
        }
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-family: 'Orbitron', sans-serif;
        }

        .summary-table th {
            text-align: left;
            padding: 0.5rem;
            color: var(--quantum-blue);
            border-bottom: 1px solid rgba(0, 240, 255, 0.3);
        }

        .summary-table td {
            padding: 0.5rem;
            border-bottom: 1px solid rgba(0, 240, 255, 0.1);
        }

        .generation-time {
            font-size: 0.85rem;
            color: var(--quantum-blue);
            text-align: right;
            margin-top: 1rem;
            font-family: 'Orbitron', sans-serif;
        }

        .summary-item {
            background: rgba(0, 240, 255, 0.1);
            padding: 0.8rem;
            border-radius: 6px;
            display: flex;
            flex-direction: column;
        }

        .summary-label {
            font-size: 0.8rem;
            color: var(--quantum-blue);
            opacity: 0.8;
        }

        .summary-value {
            font-size: 1.1rem;
            font-weight: 500;
            margin-top: 0.3rem;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .ai-container {
                grid-template-columns: 1fr;
            }

            .stat-card[style*="grid-column"] {
                grid-column: span 1 !important;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1><i class="fas fa-robot"></i> BitMinds Energy AI</h1>
        <p>Smart energy optimization recommendations</p>
    </header>

    <main class="dashboard">
        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>QUANTUM AI SYSTEM ONLINE</span>
            </div>
            <div class="last-updated">Last analysis: <span id="update-time">--:--:--</span></div>
        </div>

        <div class="ai-container">
            <!-- Daily Summary Card -->
            <div class="stat-card">
                <h2><i class="fas fa-calendar-day"></i> Yesterday's Energy Summary</h2>
                <div id="daily-summary" class="loading">
                    <i class="fas fa-circle-notch fa-spin"></i> Loading quantum data...
                </div>
            </div>

            <!-- Detailed Metrics Card -->
            <div class="stat-card">
                <h2><i class="fas fa-chart-line"></i> Detailed Metrics</h2>
                <div id="detailed-metrics" class="loading">
                    <i class="fas fa-circle-notch fa-spin"></i> Loading detailed metrics...
                </div>
            </div>

            <!-- AI Recommendations -->
            <div class="stat-card" style="grid-column: span 2;">
                <h2><i class="fas fa-lightbulb"></i> Quantum Energy Insights</h2>
                <div id="ai-recommendation" class="cyber-recommendation loading">
                    <i class="fas fa-circle-notch fa-spin"></i> Analyzing energy patterns...
                </div>
                <button id="refresh-btn" class="ai-button">
                    <i class="fas fa-sync-alt"></i> Regenerate Insights
                </button>
            </div>
        </div>

        <div class="button-container">
    <a href="#" onclick="navigateToDashboard(); return false;" class="back-button">
        <i class="fas fa-arrow-left"></i> RETURN TO DASHBOARD
    </a>
        </div>
    </main>

    <script>
        function getAuthHeaders() {
        const token = getToken();
        return {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
        };
    }
    function getToken() {
        // First try to get from localStorage
        let token = localStorage.getItem('token');
        
        // If not in localStorage, try to get from URL
        if (!token) {
            const urlParams = new URLSearchParams(window.location.search);
            token = urlParams.get('token');
            
            // If found in URL, store in localStorage for future use
            if (token) {
                localStorage.setItem('token', token);
            }
        }
        
        return token;
    }
    function navigateToDashboard() {
    const token = localStorage.getItem('token');
    if (token) {
        window.location.href = `/dashboard?token=${token}`;
    } else {
        console.error('No token found');
        window.location.href = '/';
    }
}

    function checkAuthentication() {
        const token = getToken();
        
        if (!token) {
            window.location.href = '/';
            return false;
        }
        
        return true;
    }
        // Update the DOMContentLoaded event listener in ai_recommendation.html
document.addEventListener('DOMContentLoaded', function() {
    // Check authentication
    const token = localStorage.getItem('token');
    if (!token) {
        window.location.href = '/';
        return;
    }
    function navigateToDashboard() {
    const token = localStorage.getItem('token');
    if (token) {
        window.location.href = `/dashboard?token=${token}`;
    } else {
        console.error('No token found');
        window.location.href = '/';
    }
}
    
    // Load recommendations when page loads
    loadRecommendations();
    
    // Set up refresh button
    document.getElementById('refresh-btn').addEventListener('click', function() {
        loadRecommendations();
    });
});

        // Format number with Indian locale
        function formatNumber(num) {
        return new Intl.NumberFormat('en-IN', { 
            maximumFractionDigits: 2 
        }).format(num);
    }


        // Format date in Indian format
        function formatIndianDate(dateStr) {
        if (!dateStr) return 'N/A';
        const date = new Date(dateStr);
        return date.toLocaleDateString('en-IN', {
            day: '2-digit',
            month: '2-digit',
            year: 'numeric'
        });
    }
        

        // Fetch and display recommendations
    async function loadRecommendations() {
        // Check authentication first
        if (!checkAuthentication()) {
            return;
        }

        const summaryEl = document.getElementById('daily-summary');
        const metricsEl = document.getElementById('detailed-metrics');
        const recommendationEl = document.getElementById('ai-recommendation');
        
        // Show loading states
        summaryEl.innerHTML = '<div class="loading"><i class="fas fa-circle-notch fa-spin"></i> Loading quantum data...</div>';
        metricsEl.innerHTML = '<div class="loading"><i class="fas fa-circle-notch fa-spin"></i> Loading detailed metrics...</div>';
        recommendationEl.innerHTML = '<div class="loading"><i class="fas fa-circle-notch fa-spin"></i> Analyzing energy patterns...</div>';

        try {
            // 1. Fetch daily summary WITH AUTH HEADERS
            const summaryRes = await fetch('/api/daily_summary', {
                headers: getAuthHeaders()
            });
            
            if (summaryRes.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/';
                return;
            }
            
            const summaryData = await summaryRes.json();
            
            if (!summaryRes.ok) {
                throw new Error(summaryData.error || 'Failed to load energy data');
            }

                // 2. Update summary display
            summaryEl.innerHTML = `
                <div class="summary-grid">
                    <div class="summary-item">
                        <span class="summary-label">Date</span>
                        <span class="summary-value">${formatIndianDate(summaryData.date)}</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Total Consumption</span>
                        <span class="summary-value">${summaryData.total_kwh ? formatNumber(summaryData.total_kwh) + ' kWh' : 'N/A'}</span>
                    </div>
                </div>
            `;

            // 3. Update detailed metrics
            metricsEl.innerHTML = `
                <div class="summary-grid">
                    <div class="summary-item">
                        <span class="summary-label">Avg Current</span>
                        <span class="summary-value">${summaryData.avg_current ? formatNumber(summaryData.avg_current) + 'A' : 'N/A'}</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Avg Voltage</span>
                        <span class="summary-value">${summaryData.avg_voltage ? formatNumber(summaryData.avg_voltage) + 'V' : 'N/A'}</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Max Power</span>
                        <span class="summary-value">${summaryData.max_power ? formatNumber(summaryData.max_power) + 'W' : 'N/A'}</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Samples Collected</span>
                        <span class="summary-value">${summaryData.readings_count || 'N/A'}</span>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Voltage Fluctuation</span>
                        <span class="summary-value">${summaryData.voltage_fluctuation ? formatNumber(summaryData.voltage_fluctuation) + '%' : 'N/A'}</span>
                    </div>
                </div>
            `;

            // 4. Fetch AI recommendation WITH AUTH HEADERS
            const aiRes = await fetch('/api/generate_recommendation', {
                method: 'POST',
                headers: getAuthHeaders(),
                body: JSON.stringify({ 
                    date: summaryData.date,
                    total_kwh: summaryData.total_kwh,
                    avg_voltage: summaryData.avg_voltage,
                    avg_current: summaryData.avg_current,
                    max_power: summaryData.max_power,
                    voltage_fluctuation: summaryData.voltage_fluctuation
                })
            });
            
            if (aiRes.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/';
                return;
            }
            
            const aiData = await aiRes.json();
            
            if (!aiRes.ok) {
                throw new Error(aiData.error || 'AI service failed');
            }

            // Format timestamp in Indian format
            const options = { 
                day: '2-digit', 
                month: '2-digit', 
                year: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit',
                hour12: true,
                timeZone: 'Asia/Kolkata'
            };
            const now = new Date();
            const formattedTime = now.toLocaleString('en-IN', options).replace(',', '');

            // 5. Display recommendation with cyberpunk styling
            recommendationEl.innerHTML = `
                <div class="cyber-text">
                    ${aiData.recommendation.replace(/\n/g, '<br>')}
                </div>
                <div class="generation-time">
                    <span class="timestamp">Quantum analysis generated: ${formattedTime} IST</span>
                </div>
            `;
                
                // Update last analysis time
            document.getElementById('update-time').textContent = formattedTime;
            
        } catch (error) {
            console.error("API Error:", error);
            recommendationEl.innerHTML = `
                <div class="error">
                    <i class="fas fa-exclamation-triangle"></i> 
                    ${error.message || 'Failed to load recommendations'}
                </div>
            `;
            
            // Show error in other cards too
            summaryEl.innerHTML = `
                <div class="error">
                    <i class="fas fa-exclamation-triangle"></i> 
                    Data loading failed
                </div>
            `;
            
            metricsEl.innerHTML = `
                <div class="error">
                    <i class="fas fa-exclamation-triangle"></i> 
                    Metrics unavailable
                </div>
            `;
        }
    }

            // Initialize everything
    document.addEventListener('DOMContentLoaded', function() {
        // Check authentication
        if (!checkAuthentication()) {
            return;
        }
        
        // Load recommendations when page loads
        loadRecommendations();
        
        // Set up refresh button
        document.getElementById('refresh-btn').addEventListener('click', function() {
            loadRecommendations();
        });
    });
        
    </script>
</body>
</html>
